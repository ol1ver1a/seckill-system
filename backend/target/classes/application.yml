server:
  port: 8088

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/seckill?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000

  redis:
    host: localhost
    port: 6379
    password: redis123
    lettuce:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5
        max-wait: 3000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: seckill
    password: seckill123
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.seckill.pojo
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: SeckillSystemSecretKey2024DistributedLockAndHighConcurrency
  expiration: 86400000

zookeeper:
  connect-string: localhost:2181
  session-timeout: 10000
  connection-timeout: 5000

seckill:
  order-prefix: SK
